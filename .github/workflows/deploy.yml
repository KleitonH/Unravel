name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: |
          dotnet publish backend/src/Unravel.API/Unravel.API.csproj \
            --configuration Release \
            --output backend/publish \
            --no-self-contained

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/publish
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build production
        run: npm run build -- --configuration production
        working-directory: frontend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/unravel-frontend/browser
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend-publish

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy backend to server
        run: |
          rsync -avz --delete \
            --exclude="appsettings.Production.json" \
            backend-publish/ \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_PATH }}/api/"

      - name: Copy frontend to server
        run: |
          rsync -avz --delete \
            frontend-build/ \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_PATH }}/frontend/"

      - name: Restart services and clear caches
        run: |
          ssh "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
            # Reinicia o serviço .NET — limpa todos os caches em memória
            sudo systemctl restart unravel-api

            # Aguarda o serviço subir
            sleep 3
            sudo systemctl is-active --quiet unravel-api || { echo "ERRO: unravel-api nao subiu"; exit 1; }

            # Recarrega nginx sem interromper conexões ativas
            sudo systemctl reload nginx

            # Remove temporários do .NET
            find /tmp -maxdepth 1 -name "dotnet-*" -delete 2>/dev/null || true
          EOF
